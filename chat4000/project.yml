name: chat4000
options:
  bundleIdPrefix: com.chat94
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa.git
    from: "9.10.0"
  PostHog:
    url: https://github.com/PostHog/posthog-ios.git
    from: "3.0.0"
  Intercom:
    url: https://github.com/intercom/intercom-ios.git
    from: "19.0.0"
  # TEMPORARY — confetti comparison harness (ConfettiLab). Remove these three
  # packages + ConfettiLab.swift + the Settings "Confetti Lab" row once a style
  # is picked.
  ConfettiSwiftUI:
    url: https://github.com/simibac/ConfettiSwiftUI.git
    from: "1.0.0"
  Vortex:
    url: https://github.com/twostraws/Vortex.git
    from: "1.0.0"
  SPConfetti:
    url: https://github.com/ivanvorobei/SPConfetti.git
    from: "1.0.0"
  # TEMPORARY — haptics audition harness (HapticsLab). Remove this package +
  # the Pulsar section of HapticsLab.swift + the iOSApp dependency once a
  # celebration haptic is picked.
  Pulsar:
    url: https://github.com/software-mansion-labs/pulsar-ios.git
    from: "1.0.0"
  MatrixSDKCrypto:
    # Local vendored package: standalone Olm/Megolm crypto FFI
    # (matrix-sdk-crypto-ffi). The full MatrixRustSDK was removed — the
    # homeserver has no public hostname (protocol D.3), so the SDK's HTTP mode
    # can't reach it; v2 talks the gateway WS frame protocol directly
    # (GatewayClient) and drives this crypto-only lib (CryptoEngine). The 505MB
    # xcframework is gitignored + rebuilt locally (see the crypto build steps).
    path: Vendor/MatrixSDKCrypto

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    # Our own code is warning-clean; treat Swift warnings as errors so
    # regressions fail the build. (Asset-catalog icon-size notes and the
    # vendored xcframework's link notes are emitted by other toolchains, not
    # the Swift compiler, so they are unaffected.)
    SWIFT_TREAT_WARNINGS_AS_ERRORS: "YES"
    MARKETING_VERSION: "1.1.0"
    CURRENT_PROJECT_VERSION: "9"
    DEVELOPMENT_TEAM: H45JD827CU
    CODE_SIGN_STYLE: Automatic
    APP_DISPLAY_NAME: chat4000
    APP_DISTRIBUTION_CHANNEL: dev
    APP_APNS_ENV: development
    APP_APPATTEST_ENV: development

targetTemplates:
  iOSApp:
    type: application
    platform: iOS
    sources:
      - path: Sources
        excludes:
          - "*.json"
      - path: Resources/Assets.xcassets
        buildPhase: resources
      - path: Resources/dev-config.json
        buildPhase: resources
        optional: true
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        PRODUCT_MODULE_NAME: chat4000
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          CODE_SIGN_ENTITLEMENTS: Resources/chat4000Debug.entitlements
        Release:
          CODE_SIGN_ENTITLEMENTS: Resources/chat4000.entitlements
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    dependencies:
      - package: Sentry
      - package: PostHog
      - package: Intercom
      - package: MatrixSDKCrypto
      # TEMPORARY — ConfettiLab harness (iOS only; mac code is #if canImport-guarded).
      - package: ConfettiSwiftUI
      - package: Vortex
      - package: SPConfetti
      # TEMPORARY — HapticsLab audition harness (iOS only; #if canImport-guarded).
      - package: Pulsar
    preBuildScripts:
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        script: |
          if command -v swiftlint >/dev/null 2>&1; then
            swiftlint lint --strict --config "$SRCROOT/.swiftlint.yml"
          else
            echo "warning: swiftlint not installed — skipping (brew install swiftlint)"
          fi
    postBuildScripts:
      - name: Upload dSYM to Sentry
        basedOnDependencyAnalysis: false
        script: |
          "$SRCROOT/scripts/upload-dsym-to-sentry.sh"

  # Share Sheet entry point — saves images shared from other apps into the App
  # Group inbox; the host app picks them up on next foreground. Self-contained
  # (no app/Sentry deps) so it stays small and within an extension's memory budget.
  shareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ShareExtension
        excludes:
          - "Info.plist"
          - "*.entitlements"
    settings:
      base:
        INFOPLIST_FILE: ShareExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: ShareExtension/ShareExtension.entitlements
        PRODUCT_MODULE_NAME: ShareExtension
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: false

targets:
  chat4000iphoneappstore:
    templates: [iOSApp]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.neonnode.chat94app
        APP_DISPLAY_NAME: chat4000
      configs:
        Debug:
          APP_DISTRIBUTION_CHANNEL: dev
          APP_APNS_ENV: development
          APP_APPATTEST_ENV: development
        Release:
          APP_DISTRIBUTION_CHANNEL: appstore
          APP_APNS_ENV: production
          APP_APPATTEST_ENV: production
    dependencies:
      - target: chat4000ShareAppStore
    scheme:
      gatherCoverageData: false
  chat4000iphonedev:
    templates: [iOSApp]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.neonnode.chat94app.dev
        APP_DISPLAY_NAME: chat4000Dev
        APP_DISTRIBUTION_CHANNEL: dev
        APP_APNS_ENV: development
        APP_APPATTEST_ENV: development
    dependencies:
      - target: chat4000ShareDev
    scheme:
      # Wire the unit-test bundle into the dev scheme so local verification does
      # not build or host against the App Store app target.
      testTargets:
        - chat4000Tests
      gatherCoverageData: false

  chat4000mac:
    type: application
    platform: macOS
    sources:
      - path: Sources
        excludes:
          - "*.json"
      - path: Resources/Assets.xcassets
        buildPhase: resources
      - path: Resources/dev-config.json
        buildPhase: resources
        optional: true
    settings:
      base:
        INFOPLIST_FILE: Resources/Info-macOS.plist
        PRODUCT_MODULE_NAME: chat4000
        PRODUCT_NAME: chat4000
        APP_DISPLAY_NAME: chat4000
        PRODUCT_BUNDLE_IDENTIFIER: com.neonnode.chat94app
        CODE_SIGN_ENTITLEMENTS: Resources/chat4000Mac.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Required for Apple notarization of Developer ID-signed apps.
        ENABLE_HARDENED_RUNTIME: YES
        # Mac does not register for remote notifications — APNS env unused.
        APP_APNS_ENV: ""
      configs:
        Release:
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    dependencies:
      - package: Sentry
      - package: PostHog
      - package: MatrixSDKCrypto
    preBuildScripts:
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        script: |
          if command -v swiftlint >/dev/null 2>&1; then
            swiftlint lint --strict --config "$SRCROOT/.swiftlint.yml"
          else
            echo "warning: swiftlint not installed — skipping (brew install swiftlint)"
          fi

  # One extension target per app so each extension's bundle id is prefixed by its
  # host app's id (App Store validation requires it).
  chat4000ShareAppStore:
    templates: [shareExtension]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.neonnode.chat94app.Share
  chat4000ShareDev:
    templates: [shareExtension]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.neonnode.chat94app.dev.share

  chat4000Tests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        # Test code is not held to the production warning-clean bar; keep
        # warnings as warnings here so a benign test-only warning doesn't fail
        # the suite build.
        SWIFT_TREAT_WARNINGS_AS_ERRORS: "NO"
    dependencies:
      - target: chat4000iphonedev
      - package: MatrixSDKCrypto
